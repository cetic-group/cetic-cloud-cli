name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os.name }}
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: linux-amd64,    runs-on: ubuntu-latest, ext: '',    target: cetic }
          - { name: linux-arm64,    runs-on: ubuntu-24.04-arm, ext: '', target: cetic }
          - { name: darwin-arm64,   runs-on: macos-latest, ext: '',     target: cetic }
          - { name: windows-amd64,  runs-on: windows-latest, ext: .exe, target: cetic }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # La version de la CLI est TOUJOURS dérivée du tag de release (v1.4.0 -> 1.4.0)
      # et écrite dans les sources avant le build. Le tag est donc la source unique
      # de vérité : `cetic --version` == tag, impossible de diverger.
      # Python (pas sed) pour rester portable sur les runners linux/macOS/windows.
      - name: Stamp version from tag
        shell: bash
        env:
          REF: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os, re, pathlib
          v = os.environ["REF"].removeprefix("v")
          targets = {
              "cetic/__init__.py": (r'(?m)^__version__ = .*', f'__version__ = "{v}"'),
              "pyproject.toml":    (r'(?m)^version = ".*"',   f'version = "{v}"'),
          }
          for f, (pat, repl) in targets.items():
              p = pathlib.Path(f)
              p.write_text(re.sub(pat, lambda _m: repl, p.read_text()))
              print(f"{f} -> {v}")
          PY

      - name: Build PyInstaller binary
        run: pyinstaller --clean --noconfirm cetic.spec

      - name: Rename binary
        shell: bash
        run: mv "dist/${{ matrix.os.target }}${{ matrix.os.ext }}" "dist/cetic-${{ matrix.os.name }}${{ matrix.os.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cetic-${{ matrix.os.name }}
          path: dist/cetic-${{ matrix.os.name }}*
          if-no-files-found: error

  # macOS Intel (darwin-amd64) : PAS de binaire pré-compilé. La dépendance
  # `cryptography` (≥ 49) ne publie plus de wheel macOS x86_64 (Intel Mac EOL
  # upstream) et GitHub a retiré les runners Intel macOS → le cross-build n'est
  # pas réalisable de façon fiable. Les (rares) utilisateurs Intel Mac installent
  # via `pip install git+https://github.com/cetic-group/cetic-cloud-cli` (compile
  # cryptography from-source). Binaires pré-compilés : darwin-arm64 (Apple
  # Silicon) + linux amd64/arm64 + windows amd64.

  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum cetic-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cetic-*
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
